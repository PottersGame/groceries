services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: pantrypal_db
    environment:
      POSTGRES_DB: pantrypal_sk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: .
    container_name: pantrypal_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/pantrypal_sk
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
